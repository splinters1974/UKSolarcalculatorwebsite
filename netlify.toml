[[redirects]]
  from = "https://www.uksolarcalculator.co.uk/*"
  to = "https://uksolarcalculator.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.uksolarcalculator.co.uk/*"
  to = "https://uksolarcalculator.co.uk/:splat"
  status = 301
  force = true

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "no-cache, must-revalidate"
