<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 108" role="img" aria-label="Industrial &amp; Commercial Solar Calculator">
  <!-- Gold lightning bolt -->
  <polygon points="58,4 80,48 60,48 37,98 16,52 37,52" fill="#c9a227"/>
  <!-- Navy solar panel triangle -->
  <polygon points="8,98 52,46 96,98" fill="#1e3a6e"/>
  <!-- Panel grid — horizontals -->
  <line x1="32" y1="70" x2="72" y2="70" stroke="#c9a227" stroke-width="1.5" opacity="0.75"/>
  <line x1="20" y1="84" x2="84" y2="84" stroke="#c9a227" stroke-width="1.5" opacity="0.75"/>
  <!-- Panel grid — verticals -->
  <line x1="35" y1="66" x2="35" y2="98" stroke="#c9a227" stroke-width="1.5" opacity="0.75"/>
  <line x1="52" y1="46" x2="52" y2="98" stroke="#c9a227" stroke-width="1.5" opacity="0.75"/>
  <line x1="69" y1="66" x2="69" y2="98" stroke="#c9a227" stroke-width="1.5" opacity="0.75"/>
  <!-- Gold underline -->
  <line x1="8" y1="104" x2="96" y2="104" stroke="#c9a227" stroke-width="2.5"/>
  <!-- "INDUSTRIAL & COMMERCIAL" — navy for light backgrounds -->
  <text x="118" y="42" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="19" fill="#1e3a6e" letter-spacing="2">INDUSTRIAL &amp; COMMERCIAL</text>
  <!-- "SOLAR CALCULATOR" — gold -->
  <text x="118" y="83" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="33" fill="#c9a227" letter-spacing="2">SOLAR CALCULATOR</text>
</svg>
