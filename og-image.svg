<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1e3a6e"/>
  <!-- Subtle grid pattern -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.05"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5"/>
    </pattern>
  </defs>
  <!-- Gold accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#c9a227"/>
  <!-- Lightning bolt icon -->
  <polygon points="160,80 210,220 170,220 130,380 80,240 120,240" fill="#c9a227"/>
  <!-- Panel triangle -->
  <polygon points="60,380 130,290 200,380" fill="#1b3a82" opacity="0.8"/>
  <!-- Title text -->
  <text x="260" y="200" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="68" fill="#ffffff" letter-spacing="1">INDUSTRIAL &amp; COMMERCIAL</text>
  <text x="260" y="290" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="88" fill="#c9a227" letter-spacing="2">SOLAR CALCULATOR</text>
  <!-- Subtitle -->
  <text x="262" y="370" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.75)">Free ROI calculator for UK businesses</text>
  <!-- Stats row -->
  <rect x="260" y="420" width="200" height="2" fill="#c9a227" opacity="0.5"/>
  <text x="260" y="480" font-family="Arial, sans-serif" font-weight="700" font-size="30" fill="#c9a227">4–6yr payback</text>
  <text x="260" y="520" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.6)">uksolarcalculator.co.uk</text>
</svg>
